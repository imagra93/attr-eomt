<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" width="940" height="300"><rect x="1" y="1" width="938" height="298" rx="16" fill="#0e1318" stroke="#2a3744" stroke-width="1.5"/><text x="32" y="48" font-family="DejaVu Sans, sans-serif" font-size="21" fill="#d7e0e8" text-anchor="start" font-weight="bold">Attributes ride on the detector's own match</text><text x="33" y="69" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#8c9aa8" text-anchor="start" font-weight="normal">no separate matcher — reuse EoMT's Hungarian assignment, read attributes off the matched queries</text><defs><marker id="t" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#4ec9b0"/></marker></defs><rect x="40" y="134" width="98" height="52" rx="9" fill="#10201c" stroke="#4ec9b0" stroke-width="1.4"/><text x="89.0" y="165" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#4ec9b0" text-anchor="middle" font-weight="bold">query_embed</text><path d="M142,160 H164" stroke="#4ec9b0" stroke-width="1.8" fill="none" marker-end="url(#t)"/><rect x="168" y="134" width="118" height="52" rx="9" fill="#1b232c" stroke="#5aa6f0" stroke-width="1.4"/><text x="227.0" y="157" font-family="DejaVu Sans Mono, monospace" font-size="11.5" fill="#5aa6f0" text-anchor="middle" font-weight="normal">Hungarian</text><text x="227.0" y="173" font-family="DejaVu Sans Mono, monospace" font-size="10.5" fill="#5e6b78" text-anchor="middle" font-weight="normal">matcher (reused)</text><path d="M290,160 H312" stroke="#4ec9b0" stroke-width="1.8" fill="none" marker-end="url(#t)"/><rect x="316" y="134" width="82" height="52" rx="9" fill="#1b232c" stroke="#8c9aa8" stroke-width="1.4"/><text x="357.0" y="165" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#8c9aa8" text-anchor="middle" font-weight="bold">IoU gate</text><path d="M402,160 H424" stroke="#4ec9b0" stroke-width="1.8" fill="none" marker-end="url(#t)"/><rect x="428" y="134" width="118" height="52" rx="9" fill="#10201c" stroke="#4ec9b0" stroke-width="1.4"/><text x="487.0" y="157" font-family="DejaVu Sans Mono, monospace" font-size="11.5" fill="#4ec9b0" text-anchor="middle" font-weight="normal">matched queries</text><text x="487.0" y="173" font-family="DejaVu Sans Mono, monospace" font-size="10.5" fill="#5e6b78" text-anchor="middle" font-weight="normal">[N, hidden]</text><path d="M550,160 H572" stroke="#4ec9b0" stroke-width="1.8" fill="none" marker-end="url(#t)"/><rect x="576" y="134" width="112" height="52" rx="9" fill="#1b232c" stroke="#e2b341" stroke-width="1.4"/><text x="632.0" y="157" font-family="DejaVu Sans Mono, monospace" font-size="11.5" fill="#e2b341" text-anchor="middle" font-weight="normal">per-head</text><text x="632.0" y="173" font-family="DejaVu Sans Mono, monospace" font-size="10.5" fill="#5e6b78" text-anchor="middle" font-weight="normal">cross-entropy</text><path d="M692,160 H714" stroke="#4ec9b0" stroke-width="1.8" fill="none" marker-end="url(#t)"/><rect x="718" y="134" width="90" height="52" rx="9" fill="#1b232c" stroke="#e2b341" stroke-width="1.4"/><text x="763.0" y="165" font-family="DejaVu Sans Mono, monospace" font-size="12.5" fill="#e2b341" text-anchor="middle" font-weight="bold">Σ × aux_w</text><path d="M812,160 h22 v40" stroke="#4ec9b0" stroke-width="1.8" fill="none" marker-end="url(#t)"/><text x="834" y="230" font-family="DejaVu Sans Mono, monospace" font-size="12" fill="#8c9aa8" text-anchor="middle" font-weight="normal">+ detector loss</text><text x="470.0" y="270" font-family="DejaVu Sans Mono, monospace" font-size="11.5" fill="#5e6b78" text-anchor="middle" font-weight="normal">per-head accuracy is logged to metrics.csv but never selects best.pt  —  that stays segm/mAP (or bbox/mAP)</text></svg>