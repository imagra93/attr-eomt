name: pages

# Publishes the annotated explainer (site/index.html) to GitHub Pages.
# One-time setup: enable Pages with the "GitHub Actions" source, either in
#   Settings -> Pages -> Source: GitHub Actions, or once via:
#   gh api -X POST repos/imagra93/attr-eomt/pages -f build_type=workflow
# After that, every push to main that touches site/ redeploys the page at
#   https://imagra93.github.io/attr-eomt

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/pages.yml"]
  workflow_dispatch:        # allow manual redeploys

# Allow the GITHUB_TOKEN to deploy to Pages, and OIDC for the deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
